spring:
  application:
    name: synapse
  mvc:
    apiversion:
      use:
        header: X-API-Version
      default: 1.0
  mongodb:
    uri: ${SYNAPSE_MONGODB_URI}
  kafka:
    bootstrap-servers: ${SYNAPSE_KAFKA_SERVERS}
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
      auto-offset-reset: earliest
      enable-auto-commit: false
springdoc:
  swagger-ui:
    path: /swagger-ui
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
    baggage:
      remote-fields:
        - correlationId
      correlation:
        enabled: true
        fields:
          - correlationId
synapse:
  workspace:
    base-dir: ${SYNAPSE_WORKSPACE_BASE_DIR:${java.io.tmpdir}/synapse-workspaces}
  kafka:
    task-topic: ${SYNAPSE_KAFKA_TASK_TOPIC}
    max-attempts: ${SYNAPSE_KAFKA_MAX_ATTEMPTS}
    backoff-ms: ${SYNAPSE_KAFKA_BACKOFF_MS}
  jira:
    base-url: ${SYNAPSE_JIRA_BASE_URL}
    username: ${SYNAPSE_JIRA_USERNAME}
    token: ${SYNAPSE_JIRA_TOKEN}
    project: ${SYNAPSE_JIRA_PROJECT}
  git:
    token: ${SYNAPSE_GIT_TOKEN}
  agent:
    docker:
      image: ${SYNAPSE_AGENT_DOCKER_IMAGE}
      container-workspace-path: ${SYNAPSE_AGENT_CONTAINER_WORKSPACE}
      memory-limit: ${SYNAPSE_AGENT_MEMORY_LIMIT}
      cpus: ${SYNAPSE_AGENT_CPUS}
      timeout-seconds: ${SYNAPSE_AGENT_TIMEOUT_SECONDS}
      model: ${SYNAPSE_AGENT_MODEL}
      api-base-url: ${SYNAPSE_AGENT_API_BASE_URL}