name: Feature Proposal
description: Propose a new feature, adapter, or enhancement for Synapse
title: "[FEAT]: "
labels: ["enhancement", "proposal"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve **Synapse**! We value thoughtful proposals that fit within our Hexagonal Architecture and improve autonomous engineering workflows.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature proposal related to a specific problem or bottleneck? Please describe.
      placeholder: e.g., Currently, Synapse only supports Jira for enrichment, but our team uses linear.app or GitHub Issues...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution & Architectural Fit
      description: How should this feature be implemented? Which ports and adapters would be added or modified?
      placeholder: |
        We should introduce a new adapter under `dev.synapse.adapter.out.linear.*` implementing the existing `JiraEnrichmentPort` (or rename the port to a generalized `TaskEnrichmentPort`)...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative approaches or workarounds you have considered.
  - type: checkboxes
    id: willingness
    attributes:
      label: Contribution Willingness
      description: Would you be interested in implementing this feature yourself with guidance from the maintainer?
      options:
        - label: Yes, I am willing to submit a Pull Request for this feature!
